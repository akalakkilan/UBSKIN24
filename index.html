{"t": "IMS", "q": "Tata laksana lini pertama uretritis gonore tanpa komplikasi saat ini adalah?", "o": ["Ceftriaxone 250 mg intramuskular dosis tunggal", "Doksisiklin 100 mg dosis tunggal", "Metronidazol 2 gram dosis tunggal", "Penisilin prokain 600 ribu unit", "Flukonazol 150 mg dosis tunggal"], "a": "Ceftriaxone 250 mg intramuskular dosis tunggal", "skdi": "4A", "e": "Gonore diterapi sefalosporin (ceftriaxone IM) karena resistensi penisilin/kuinolon, sering ditambah terapi klamidia. Doksisiklin dosis tunggal tidak adekuat untuk gonore, metronidazol untuk trikomoniasis, flukonazol untuk kandida.", "n": "Anthelix no.50"},
{"t": "IMS", "q": "Tata laksana herpes genitalis rekuren adalah?", "o": ["Asiklovir 5x200 mg per oral selama 5-7 hari", "Benzatin penisilin 2,4 juta unit dosis tunggal", "Metronidazol 2 gram dosis tunggal", "Doksisiklin 100 mg selama 7 hari", "Flukonazol 150 mg dosis tunggal"], "a": "Asiklovir 5x200 mg per oral selama 5-7 hari", "skdi": "4A", "e": "Herpes genitalis diterapi asiklovir oral (mis. 5x200 mg atau 3x400 mg) selama 5-7 hari. Benzatin penisilin untuk sifilis, metronidazol untuk trikomoniasis, doksisiklin untuk klamidia, flukonazol untuk kandida.", "n": "Ascendens no.50"},
{"t": "Bakteriologi", "q": "Tata laksana topikal untuk eritrasma adalah?", "o": ["Krim eritromisin atau klindamisin", "Krim permetrin", "Krim asiklovir", "Krim nistatin", "Krim hidrokortison"], "a": "Krim eritromisin atau klindamisin", "skdi": "4A", "e": "Eritrasma (Corynebacterium minutissimum) diterapi antibiotik topikal eritromisin/klindamisin (atau eritromisin oral pada lesi luas). Permetrin antiparasit, asiklovir antivirus, nistatin antijamur, hidrokortison steroid.", "n": "Ascendens no.50"},
{"t": "Tumor Kulit", "q": "Pada evaluasi tahi lalat dengan kaidah ABCDE, manakah temuan yang paling mengarah ke keganasan melanoma?", "o": ["Diameter lebih dari 6 mm", "Warna homogen", "Batas tegas dan rata", "Permukaan datar tanpa peninggian", "Bentuk simetris"], "a": "Diameter lebih dari 6 mm", "skdi": "2", "e": "ABCDE melanoma: Asimetri, Border ireguler, Color bervariasi, Diameter lebih dari 6 mm, dan Evolusi. Diameter lebih dari 6 mm termasuk tanda kecurigaan. Warna homogen, batas tegas, datar, dan simetris justru ciri lesi jinak.", "n": "Arthron 18 no.16 / Aorta 19 no.47"},
{"t": "Kusta", "q": "Indeks morfologi pada pemeriksaan kusta digunakan untuk menilai?", "o": ["Keberhasilan terapi melalui proporsi kuman utuh", "Jumlah total kuman pada sediaan", "Tipe reaksi kusta", "Derajat cacat", "Kadar antibodi serum"], "a": "Keberhasilan terapi melalui proporsi kuman utuh", "skdi": "4A", "e": "Indeks morfologi menilai persentase basil utuh atau hidup terhadap total basil, mencerminkan keberhasilan terapi dan infektivitas. Jumlah total kuman dinilai indeks bakteri, bukan indeks morfologi.", "n": "Arthron 18 no.32 / Amygdala no.51"},
{"t": "Penyakit Autoimun", "q": "Perempuan 25 tahun dengan ruam kemerahan di pipi yang memberat saat terpapar matahari, atrofi sentral, disertai sitopenia. Apakah diagnosis yang paling mungkin?", "o": ["Lupus eritematosus diskoid", "Dermatitis seboroik", "Rosasea", "Dermatitis kontak", "Melasma"], "a": "Lupus eritematosus diskoid", "skdi": "3A", "e": "Plak eritem fotosensitif dengan atrofi sentral dan sumbatan folikel khas lupus diskoid; sitopenia mendukung lupus. Dermatitis seboroik di area berminyak, rosasea dengan flushing, dermatitis kontak terkait alergen, melasma hanya hiperpigmentasi.", "n": "Aorta 19 no.20 / Ascendens no.4"},
{"t": "Dermatitis", "q": "Pasien dengan dermatitis venenata akibat serangga Paederus atau tomcat. Apakah edukasi pencegahan yang paling tepat?", "o": ["Menghindari dan menghalau serangga tanpa menggencet di kulit", "Mengompres dengan air panas", "Menggosok lesi dengan alkohol pekat", "Memberi antibiotik oral rutin", "Memberi antijamur topikal"], "a": "Menghindari dan menghalau serangga tanpa menggencet di kulit", "skdi": "4A", "e": "Dermatitis venenata dicegah dengan menghindari kontak dan tidak menggencet serangga di kulit agar toksin tidak menyebar. Air panas dan alkohol pekat memperberat, antibiotik dan antijamur bukan pencegahan utama.", "n": "Aorta 19 no.90"},
{"t": "Farmakologi", "q": "Manakah antihistamin H1 generasi ketiga berikut?", "o": ["Levocetirizine", "Chlorpheniramine", "Difenhidramin", "Prometazin", "Hidroksizin"], "a": "Levocetirizine", "skdi": "— (farmakologi)", "e": "Levocetirizine bersama feksofenadin dan desloratadin merupakan antihistamin generasi ketiga, enansiomer atau metabolit aktif dengan sedasi minimal. Sisanya generasi pertama yang sedatif.", "n": "Aorta 19 no.51 / Amygdala no.92"},
{"t": "Mikosis", "q": "Bayi dengan bercak putih di lidah dan mukosa mulut yang sulit dilepas, ibu sedang menyusui. Apakah diagnosis yang tepat?", "o": ["Kandidiasis oral", "Leukoplakia", "Liken planus oral", "Stomatitis aftosa", "Difteri"], "a": "Kandidiasis oral", "skdi": "4A", "e": "Plak putih seperti susu yang melekat di mukosa mulut bayi khas kandidiasis oral oleh Candida albicans. Leukoplakia dan liken planus pada dewasa, stomatitis aftosa berupa ulkus nyeri, difteri membentuk pseudomembran abu-abu.", "n": "Ascendens no.89"},
{"t": "Kelenjar Apokrin", "q": "Bau badan tidak sedap akibat penguraian sekret oleh bakteri pada kelenjar apokrin disebut?", "o": ["Bromhidrosis", "Hiperhidrosis", "Anhidrosis", "Miliaria", "Hipohidrosis"], "a": "Bromhidrosis", "skdi": "— (fisiologi)", "e": "Bromhidrosis adalah bau badan akibat degradasi sekret apokrin oleh bakteri. Hiperhidrosis keringat berlebih, anhidrosis tidak berkeringat, miliaria sumbatan kelenjar keringat, hipohidrosis keringat berkurang.", "n": "Anthelix no.14 / Amygdala no.4"},
{"t": "TB Kulit", "q": "Media kultur standar untuk Mycobacterium tuberculosis penyebab skrofuloderma adalah?", "o": ["Lowenstein-Jensen", "Sabouraud dextrose agar", "MacConkey agar", "Thayer-Martin", "Agar darah"], "a": "Lowenstein-Jensen", "skdi": "3A", "e": "Mycobacterium tuberculosis dikultur pada media Lowenstein-Jensen. Sabouraud untuk jamur, MacConkey untuk basil Gram negatif, Thayer-Martin untuk Neisseria, agar darah untuk bakteri umum.", "n": "Aorta 19 no.3 / Kuis Pekan 3 no.1"},
{"t": "Eritroskuamosa", "q": "Pada histopatologi psoriasis, kumpulan neutrofil di dalam stratum korneum disebut?", "o": ["Mikroabses Munro", "Badan Civatte", "Sel Tzanck", "Granuloma Langhans", "Badan Donovan"], "a": "Mikroabses Munro", "skdi": "3A", "e": "Mikroabses Munro berupa neutrofil dalam stratum korneum parakeratotik khas psoriasis, selain akantosis reguler dan pemanjangan rete ridges. Badan Civatte pada liken planus, sel Tzanck pada herpes, granuloma Langhans pada TB.", "n": "Anthelix no.24"},
{"t": "Eritroskuamosa", "q": "Eritroderma menyeluruh dengan limfadenopati dan ditemukan sel Sezary pada darah tepi paling mengarah pada?", "o": ["Limfoma sel T kutaneus", "Reaksi alergi obat ringan", "Infeksi jamur superfisial", "Psoriasis gutata", "Dermatitis kontak iritan"], "a": "Limfoma sel T kutaneus", "skdi": "2", "e": "Eritroderma dengan sel Sezary dan limfadenopati mengarah pada sindrom Sezary atau cutaneous T-cell lymphoma yang bersifat keganasan. Bukan alergi ringan, infeksi jamur, psoriasis gutata, atau dermatitis kontak iritan.", "n": "Aorta 19 no.40 / Amygdala no.17"},
{"t": "Dermatitis", "q": "Pasien dengan plak berbentuk koin, berbatas tegas, basah dan gatal di tungkai. Apakah diagnosis yang tepat?", "o": ["Dermatitis numularis", "Tinea korporis", "Psoriasis", "Dermatitis seboroik", "Pitiriasis rosea"], "a": "Dermatitis numularis", "skdi": "4A", "e": "Lesi berbentuk koin yang gatal dan eksudatif khas dermatitis numularis. Tinea korporis ada central healing dengan KOH positif, psoriasis skuama mikaseus, seboroik area berminyak, pitiriasis rosea dengan herald patch.", "n": "Aorta 19 no.29 / Ascendens no.4"},
{"t": "Virologi", "q": "Laki-laki 30 tahun dengan papul kasar berduri di jari tangan, permukaan bertitik hitam. Apakah diagnosis yang tepat?", "o": ["Veruka vulgaris", "Moluskum kontagiosum", "Keratosis seboroik", "Klavus", "Karsinoma sel skuamosa"], "a": "Veruka vulgaris", "skdi": "4A", "e": "Papul verukosa dengan titik hitam berupa kapiler trombosis khas veruka vulgaris akibat HPV. Moluskum dengan umbilikasi, keratosis seboroik stuck-on pada lansia, klavus mata ikan akibat tekanan, karsinoma sel skuamosa tumbuh invasif.", "n": "Aorta 19 no.74 / Amygdala no.21"},
{"t": "Farmakologi", "q": "Sediaan topikal untuk dipakai pada seluruh tubuh dalam satu kali aplikasi kira-kira membutuhkan?", "o": ["30 gram", "5 gram", "10 gram", "15 gram", "100 gram"], "a": "30 gram", "skdi": "— (farmakologi)", "e": "Untuk mengoles seluruh permukaan tubuh dewasa sekali aplikasi dibutuhkan sekitar 30 gram. 15 gram untuk wajah selama beberapa hari, jumlah lain tidak sesuai perkiraan kebutuhan satu kali olesan seluruh tubuh.", "n": "Axon 20 no.30 / Amygdala no.93"},
{"t": "Bioetik", "q": "Seorang dokter melayani semua pasien tanpa membedakan suku, agama, atau status sosial. Kaidah bioetik yang diterapkan adalah?", "o": ["Justice", "Autonomy", "Beneficence", "Non-maleficence", "Veracity"], "a": "Justice", "skdi": "— (etik)", "e": "Memperlakukan pasien secara adil dan setara mencerminkan justice. Autonomy menghormati keputusan pasien, beneficence berbuat baik, non-maleficence tidak membahayakan, veracity kejujuran.", "n": "Aorta 19 no.81 / Ascendens no.32"},
{"t": "Farmakologi", "q": "Kortikosteroid sistemik sebaiknya diberikan pada pagi hari untuk menyesuaikan?", "o": ["Irama diurnal sekresi kortisol", "Waktu makan malam", "Jadwal tidur siang", "Kadar gula darah puasa", "Siklus menstruasi"], "a": "Irama diurnal sekresi kortisol", "skdi": "— (farmakologi)", "e": "Pemberian pagi hari mengikuti irama diurnal kortisol endogen yang memuncak pagi sehingga menekan supresi aksis HPA. Faktor lain bukan dasar penjadwalan ini.", "n": "Amygdala no.38"},
{"t": "Farmakologi", "q": "Bentuk sediaan berupa campuran homogen zat aktif yang terlarut sempurna dalam pelarut cair disebut?", "o": ["Solusio", "Suspensi", "Emulsi", "Pasta", "Salep"], "a": "Solusio", "skdi": "— (farmakologi)", "e": "Solusio adalah larutan homogen zat terlarut dalam pelarut. Suspensi partikel padat tersebar dalam cairan, emulsi campuran dua cairan tak bercampur, pasta dan salep sediaan semisolid.", "n": "Axon 20 no.28"},
{"t": "Kusta", "q": "Pada pemeriksaan slit skin smear, indeks bakteri tertinggi yaitu 6+ berarti ditemukan?", "o": ["Lebih dari 1000 basil dalam satu lapangan pandang", "1 sampai 10 basil dalam 100 lapangan pandang", "1 sampai 10 basil dalam 10 lapangan pandang", "1 sampai 10 basil dalam 1 lapangan pandang", "10 sampai 100 basil dalam 10 lapangan pandang"], "a": "Lebih dari 1000 basil dalam satu lapangan pandang", "skdi": "4A", "e": "Skala Ridley indeks bakteri 6+ berarti lebih dari 1000 basil per lapangan pandang. Nilai 5+ adalah 100 sampai 1000 per lapangan, sedangkan jumlah kecil per banyak lapangan adalah nilai indeks rendah.", "n": "Amygdala no.65 / Aorta 19 no.59"},
{"t": "Erupsi Obat", "q": "Tata laksana awal pasien Stevens-Johnson syndrome di fasilitas kesehatan adalah?", "o": ["Hentikan obat penyebab dan rawat suportif dengan resusitasi cairan", "Lanjutkan obat penyebab dengan dosis dikurangi", "Berikan antijamur sistemik", "Berikan antivirus oral rutin", "Berikan antibiotik topikal saja"], "a": "Hentikan obat penyebab dan rawat suportif dengan resusitasi cairan", "skdi": "3B", "e": "Langkah utama SJS atau TEN adalah menghentikan obat penyebab segera, rawat suportif berupa cairan, nutrisi, perawatan luka, dan suhu, lalu rujuk. Melanjutkan obat berbahaya; antijamur, antivirus, dan antibiotik bukan terapi utama.", "n": "Ascendens no.50"},
{"t": "Kelenjar Sebasea", "q": "Remaja dengan komedo sekitar 10 buah, papul dan pustul total kurang dari 15 tanpa nodul. Termasuk akne vulgaris derajat?", "o": ["Ringan", "Sedang", "Berat", "Sangat berat", "Nodulokistik"], "a": "Ringan", "skdi": "4A", "e": "Komedo sedikit dengan papulopustul minimal tanpa nodul atau kista termasuk akne derajat ringan. Derajat sedang bila lesi inflamasi lebih banyak, berat bila ada nodul atau kista luas.", "n": "Amygdala no.66 / Ascendens no.20"},
{"t": "Dermatitis", "q": "Apa perbedaan mendasar patogenesis dermatitis kontak alergi dibanding dermatitis kontak iritan?", "o": ["DKA melibatkan sensitisasi imun spesifik sedangkan DKI akibat kerusakan langsung non-imunologik", "DKA tidak melibatkan sistem imun sama sekali", "DKI selalu memerlukan paparan berulang bertahun-tahun", "DKA hanya terjadi pada anak", "DKI diperantarai imunoglobulin E"], "a": "DKA melibatkan sensitisasi imun spesifik sedangkan DKI akibat kerusakan langsung non-imunologik", "skdi": "4A", "e": "DKA adalah hipersensitivitas tipe IV yang membutuhkan sensitisasi alergen sebelumnya, sedangkan DKI akibat efek toksik atau iritan langsung tanpa mekanisme imun spesifik. DKI bisa terjadi pada paparan pertama bila iritan kuat.", "n": "Arthron 18 no.48"},
{"t": "IMS", "q": "Hasil serologi sifilis menunjukkan VDRL reaktif titer rendah namun TPHA non-reaktif. Interpretasi yang paling tepat adalah?", "o": ["Reaksi positif palsu biologik", "Sifilis primer aktif", "Sifilis laten lanjut", "Reinfeksi sifilis", "Neurosifilis"], "a": "Reaksi positif palsu biologik", "skdi": "3A", "e": "VDRL reaktif dengan TPHA non-reaktif menandakan biological false positive seperti pada kehamilan, infeksi, atau autoimun karena tes treponemal spesifik negatif. Diagnosis sifilis aktif memerlukan tes treponemal yang reaktif.", "n": "Aorta 19 no.95"},
{"t": "IMS", "q": "Mekanisme rekurensi herpes genitalis adalah?", "o": ["Reaktivasi HSV laten di ganglion akibat penurunan imunitas", "Reinfeksi ulang dari pasangan setiap episode", "Mutasi virus menjadi resisten", "Reaksi autoimun terhadap epidermis", "Infeksi bakteri sekunder"], "a": "Reaktivasi HSV laten di ganglion akibat penurunan imunitas", "skdi": "4A", "e": "Rekurensi herpes genitalis terjadi karena reaktivasi HSV yang laten di ganglion sakral saat imunitas menurun seperti stres, demam, atau haid. Bukan reinfeksi baru, mutasi, autoimun, atau infeksi bakteri.", "n": "Amygdala no.56 / Aorta 19 no.32"},
{"t": "Pigmentasi", "q": "Hormon yang berperan memperberat melasma terutama pada kehamilan dan pengguna kontrasepsi adalah?", "o": ["Estrogen dan progesteron", "Insulin dan glukagon", "Tiroksin dan kalsitonin", "Kortisol dan aldosteron", "Adrenalin dan noradrenalin"], "a": "Estrogen dan progesteron", "skdi": "4A", "e": "Estrogen dan progesteron merangsang melanogenesis sehingga memperberat melasma pada kehamilan atau kontrasepsi hormonal bersama paparan ultraviolet. Hormon lain tidak berperan langsung pada melasma.", "n": "Ascendens no.52"},
{"t": "Dermatofitosis", "q": "Molekul dinding sel dermatofita yang menekan proliferasi keratinosit dan respon imun lokal adalah?", "o": ["Mannan", "Koagulase", "Hyaluronidase", "Toksin eksfoliatif", "Lipase"], "a": "Mannan", "skdi": "— (patofisiologi)", "e": "Mannan dari dinding sel dermatofita seperti Trichophyton rubrum menekan proliferasi keratinosit dan respon imun lokal sehingga infeksi menjadi kronik. Koagulase dan toksin eksfoliatif milik Staphylococcus aureus, hyaluronidase milik streptokokus.", "n": "Arthron 18 no.33"},
{"t": "Fotobiologi", "q": "Sinar ultraviolet yang memiliki panjang gelombang terpanjang dan penetrasi paling dalam ke dermis adalah?", "o": ["UVA", "UVB", "UVC", "Sinar tampak", "Inframerah"], "a": "UVA", "skdi": "— (fotobiologi)", "e": "UVA dengan panjang gelombang 320 sampai 400 nm berpenetrasi paling dalam hingga dermis dan berperan pada penuaan kulit dan pigmentasi. UVB lebih dangkal menyebabkan sunburn, UVC diserap ozon, sinar tampak dan inframerah berbeda mekanisme.", "n": "Arthron 18 no.12"},
{"t": "Fotobiologi", "q": "Tanda molekuler khas kerusakan DNA akibat sinar ultraviolet adalah?", "o": ["Pembentukan dimer pirimidin", "Pemutusan untai tunggal oleh radikal bebas saja", "Metilasi sitosin", "Delesi mitokondria masif", "Translokasi kromosom"], "a": "Pembentukan dimer pirimidin", "skdi": "— (fotobiologi)", "e": "Ultraviolet terutama UVB menyebabkan dimer pirimidin atau cyclobutane pyrimidine dimer yang memicu mutasi bila tidak diperbaiki. Mekanisme lain bukan tanda khas kerusakan ultraviolet.", "n": "Ascendens no.73"},
{"t": "Vitamin D", "q": "Paparan sinar matahari menghasilkan vitamin D melalui konversi di kulit dari?", "o": ["7-dehidrokolesterol menjadi previtamin D3", "Beta karoten menjadi retinol", "Kolekalsiferol menjadi 7-dehidrokolesterol", "Ergosterol menjadi melanin", "Tirosin menjadi melanin"], "a": "7-dehidrokolesterol menjadi previtamin D3", "skdi": "— (fisiologi)", "e": "UVB mengubah 7-dehidrokolesterol di epidermis menjadi previtamin D3 lalu vitamin D3, yang kemudian dihidroksilasi di hati dan ginjal. Pilihan lain bukan jalur sintesis vitamin D.", "n": "Anthelix no.80"},
{"t": "Bakteriologi", "q": "Seorang perempuan 25 tahun mengeluh gatal dan kemerahan pada lipatan paha sejak 8 hari. Status dermatologis: makula eritem dengan skuama halus. Pemeriksaan KOH negatif, dan lampu Wood memperlihatkan fluoresensi merah bata (coral red). Apakah etiologi tersering kasus ini?", "o": ["Corynebacterium minutissimum", "Candida albicans", "Trichophyton rubrum", "Malassezia furfur", "Staphylococcus aureus"], "a": "Corynebacterium minutissimum", "skdi": "4A", "e": "Fluoresensi merah bata pada lampu Wood dengan KOH negatif khas eritrasma yang disebabkan Corynebacterium minutissimum. Candida memberi pseudohifa pada KOH, Trichophyton memberi hifa bersepta, Malassezia memberi gambaran spaghetti and meatballs, Staphylococcus menyebabkan pioderma.", "n": "Ascendens no.45"},
{"t": "Erupsi Obat", "q": "Seorang perempuan 47 tahun datang dengan bercak merah di seluruh tubuh disertai sariawan sejak 2 hari, dua minggu setelah mengonsumsi alopurinol untuk nyeri sendi. Tampak makula eritem, vesikel, purpura, dan erosi pada mukosa mulut, anogenital, serta mata, dengan luas lepasnya kulit kurang dari 10 persen. Apakah diagnosis yang tepat?", "o": ["Stevens-Johnson syndrome", "Nekrolisis epidermal toksik", "Eritema multiforme minor", "Pemfigus vulgaris", "Fixed drug eruption generalisata"], "a": "Stevens-Johnson syndrome", "skdi": "3B", "e": "Keterlibatan dua atau lebih mukosa dengan lepasnya epidermis kurang dari 10 persen luas tubuh akibat obat khas Stevens-Johnson syndrome. TEN bila lebih dari 30 persen, eritema multiforme minor tanpa keterlibatan mukosa luas, pemfigus dengan bula kendur kronik, FDE berupa lesi terbatas berulang di lokasi sama.", "n": "Aorta 19 no.61 / Aorta 19 no.48"},
{"t": "Kelenjar Ekrin", "q": "Seorang bayi laki-laki 9 bulan dibawa dengan keluhan biang keringat. Pemeriksaan fisik menunjukkan papulovesikel eritem di leher, badan, dan ketiak. Histopatologi memperlihatkan infiltrat limfosit periduktal pada papila dermis dan epidermis bawah. Apakah diagnosis yang sesuai?", "o": ["Miliaria rubra", "Miliaria kristalina", "Miliaria profunda", "Anhidrotic asthenia", "Bromhidrosis"], "a": "Miliaria rubra", "skdi": "4A", "e": "Papulovesikel eritem akibat sumbatan duktus ekrin pada lapisan epidermis dengan radang khas miliaria rubra (prickly heat). Miliaria kristalina berupa vesikel jernih superfisial tanpa radang, miliaria profunda sumbatan lebih dalam, anhidrotic asthenia bila luas, bromhidrosis adalah bau badan apokrin.", "n": "Aorta 19 no.83"},
{"t": "Kusta", "q": "Seorang perempuan 35 tahun mengeluh bercak di lengan dan dada sejak 6 bulan yang makin menebal dan mati rasa, disertai jari tangan kaku seperti cakar ayam dan kulit kering sulit berkeringat. Apakah pemeriksaan penunjang sederhana untuk menegakkan diagnosis?", "o": ["Pemeriksaan basil tahan asam dari kerokan kulit", "Pengecatan Gram", "Pemeriksaan KOH", "Sediaan basah NaCl", "Tes Tzanck"], "a": "Pemeriksaan basil tahan asam dari kerokan kulit", "skdi": "4A", "e": "Bercak hipoestesi dengan penebalan saraf dan deformitas khas kusta; pemeriksaan sederhana berupa slit skin smear dengan pewarnaan Ziehl-Neelsen mencari basil tahan asam. Gram untuk bakteri umum, KOH untuk jamur, NaCl untuk trikomonas, Tzanck untuk infeksi herpes.", "n": "Aorta 19 no.66"},
{"t": "Eritroskuamosa", "q": "Seorang laki-laki 60 tahun diantar keluarga karena bercak merah hampir di seluruh tubuh sejak 1 minggu, disertai gatal dan demam ringan, tanpa riwayat konsumsi obat. Tampak patch eritem dengan skuama mengenai lebih dari 60 persen luas tubuh dan pembesaran limfonodi leher. Apakah diagnosis yang paling tepat?", "o": ["Eritroderma", "Psoriasis vulgaris", "Dermatitis atopik", "Pitiriasis rubra pilaris", "Tinea korporis"], "a": "Eritroderma", "skdi": "3A", "e": "Eritem dan skuama generalisata lebih dari 90 persen (di sini luas dan progresif) dengan limfadenopati disebut eritroderma, suatu kegawatan dermatologi. Psoriasis dan dermatitis atopik bisa menjadi penyebab tetapi diagnosis sindromiknya tetap eritroderma; tinea korporis terlokalisir dengan central healing.", "n": "Aorta 19 no.40"},
{"t": "Mikosis", "q": "Seorang laki-laki muda penggemar futsal yang sering berkeringat memiliki bercak putih bersisik halus di punggung; KOH menunjukkan hifa pendek dan spora bergerombol. Setelah diberi antijamur, apakah edukasi yang paling tepat?", "o": ["Menghindari keringat berlebih, mandi setelah berolahraga, dan memakai antijamur sesuai anjuran", "Mandi memakai sabun antibiotik setiap hari", "Menghindari konsumsi makanan tinggi protein", "Cukup berobat sekali tanpa perlu kontrol", "Menghindari paparan sinar matahari sepenuhnya"], "a": "Menghindari keringat berlebih, mandi setelah berolahraga, dan memakai antijamur sesuai anjuran", "skdi": "4A", "e": "Pitiriasis versikolor dipicu kelembapan dan keringat; edukasi utama menjaga kulit kering, mandi setelah berkeringat, dan memakai antijamur topikal atau sampo sesuai anjuran karena rekurensi tinggi. Sabun antibiotik, pembatasan protein, berobat sekali, atau menghindari matahari total bukan edukasi yang tepat.", "n": "Anthelix no.8"},
{"t": "IMS", "q": "Seorang perempuan 34 tahun mantan pekerja migran datang dengan luka pada kelamin sejak seminggu yang tidak nyeri, riwayat berhubungan seks berisiko. Status lokalis: ulkus tunggal pada vulva, dasar bersih, tepi rata dan teraba indurasi. Apakah diagnosis yang paling tepat?", "o": ["Sifilis primer", "Ulkus mole", "Limfogranuloma venereum", "Herpes genitalis", "Granuloma inguinale"], "a": "Sifilis primer", "skdi": "4A", "e": "Ulkus genital tunggal, tidak nyeri, dasar bersih, dengan tepi terindurasi adalah ulkus durum sifilis primer. Ulkus mole nyeri dengan dasar kotor, herpes berupa vesikel berkelompok nyeri, LGV dengan limfadenopati, granuloma inguinale berupa ulkus granulomatosa mudah berdarah.", "n": "Aorta 19 no.23"},
{"t": "Vesikobulosa", "q": "Seorang perempuan 44 tahun datang dengan lepuh di seluruh tubuh sejak 2 minggu, bula kendur mudah pecah dan nyeri, didahului sariawan di bibir dan mulut. Tanda Nikolsky positif. Di lapisan manakah letak bula pada kasus ini?", "o": ["Intraepidermal suprabasal", "Subepidermal", "Subkorneal", "Pada taut dermoepidermal yang tegang", "Intradermal"], "a": "Intraepidermal suprabasal", "skdi": "3A", "e": "Pemfigus vulgaris menimbulkan bula kendur akibat akantolisis suprabasal sehingga letak bula intraepidermal dan tanda Nikolsky positif. Pemfigoid bulosa memberi bula tegang subepidermal, dan bula subkorneal terdapat pada impetigo bulosa atau pemfigus foliaseus.", "n": "Axon 20 no.13 / Aorta 19 no.43"},
{"t": "Virologi", "q": "Seorang anak laki-laki 2 tahun dibawa karena bercak merah hampir seluruh tubuh, didahului demam tinggi 4 hari, batuk, pilek, dan mata merah. Ruam mulai dari belakang telinga dan wajah lalu meluas ke badan. Apakah diagnosis yang paling tepat?", "o": ["Morbili", "Rubela", "Roseola infantum", "Eritema infeksiosum", "Demam skarlatina"], "a": "Morbili", "skdi": "4A", "e": "Demam tinggi dengan gejala 3C (cough, coryza, conjunctivitis) diikuti ruam makulopapular sefalokaudal mulai dari belakang telinga khas morbili (campak). Rubela ruam lebih ringan dengan limfadenopati, roseola ruam muncul saat demam turun, eritema infeksiosum dengan slapped cheek, skarlatina dengan lidah strawberry.", "n": "Amygdala no.26"},
{"t": "Tumor Kulit", "q": "Seorang laki-laki 70 tahun petani datang dengan benjolan di pipi yang mudah berdarah sejak 1 tahun, membesar perlahan dengan ulkus di tengah. Tampak nodul dengan tepi pearly white, teleangiektasis, dan ulkus ireguler. Dari lapisan manakah tumor ini berasal?", "o": ["Sel basal epidermis", "Stratum korneum", "Stratum spinosum", "Kelenjar sebasea", "Melanosit"], "a": "Sel basal epidermis", "skdi": "2", "e": "Nodul tepi pearly white dengan teleangiektasis dan ulserasi pada area terpajan matahari khas karsinoma sel basal yang berasal dari sel basal epidermis. Karsinoma sel skuamosa dari stratum spinosum, melanoma dari melanosit, dan tumor adneksa dari kelenjar.", "n": "Arthron 18 no.26"},
{"t": "Dermatitis", "q": "Seorang laki-laki 43 tahun tukang cukur yang sering berdiri lama mengeluh kehitaman dan gatal pada tungkai bawah sejak 1 tahun. Tampak makula hiperpigmentasi berbatas tidak tegas dengan skuama dan ekskoriasi, serta pembuluh darah melebar berkelok di tungkai. Apakah diagnosis yang paling tepat?", "o": ["Dermatitis statis", "Tinea pedis", "Dermatitis numularis", "Liken simpleks kronik", "Dermatitis kontak alergi"], "a": "Dermatitis statis", "skdi": "3A", "e": "Hiperpigmentasi, gatal, dan perubahan kulit tungkai bawah disertai varises akibat insufisiensi vena kronik khas dermatitis statis. Tinea pedis dengan KOH positif, numularis berbentuk koin, liken simpleks kronik berupa likenifikasi akibat garukan, DKA terkait alergen kontak.", "n": "Aorta 19 no.29"},
{"t": "Erupsi Obat", "q": "Seorang laki-laki 25 tahun datang dengan bercak keunguan di bibir atas sejak 2 hari, terasa panas dan perih, didahului warna kecoklatan. Pasien baru mengonsumsi levofloksasin dan pernah mengalami keluhan serupa di lokasi yang sama. Apakah diagnosis yang paling tepat?", "o": ["Fixed drug eruption", "Stevens-Johnson syndrome", "Eritema multiforme", "Herpes labialis", "Cheilitis kontak"], "a": "Fixed drug eruption", "skdi": "4A", "e": "Lesi soliter berulang di lokasi yang sama setelah konsumsi obat tertentu, berupa makula keunguan yang meninggalkan hiperpigmentasi, khas fixed drug eruption. SJS melibatkan mukosa luas, eritema multiforme dengan lesi target, herpes labialis berupa vesikel berkelompok, cheilitis kontak akibat iritan.", "n": "Aorta 19 no.44"},
{"t": "IMS", "q": "Seorang laki-laki 28 tahun datang dengan lenting nyeri di kemaluan sejak 2 hari, didahului demam dan tidak nafsu makan. Pasien memiliki riwayat keluhan serupa 3 bulan lalu yang sembuh dengan obat dan riwayat berhubungan dengan pekerja seks. Apakah diagnosis yang paling tepat?", "o": ["Herpes genitalis rekuren", "Sifilis primer", "Ulkus mole", "Kondiloma akuminata", "Limfogranuloma venereum"], "a": "Herpes genitalis rekuren", "skdi": "4A", "e": "Vesikel berkelompok nyeri yang berulang di lokasi yang sama dengan gejala prodromal khas herpes genitalis rekuren akibat reaktivasi HSV. Sifilis primer berupa ulkus tidak nyeri, ulkus mole ulkus nyeri dasar kotor, kondiloma berupa vegetasi, LGV dengan limfadenopati.", "n": "Kuis Pekan 3 no.7"},
{"t": "Kusta", "q": "Seorang laki-laki datang dengan demam dan nodul kemerahan yang nyeri pada keempat ekstremitas sejak beberapa bulan, disertai kontraktur, jari kaki dan tangan clawing, serta pembesaran nervus ulnaris bilateral. Apakah jenis reaksi yang dialami pasien?", "o": ["Eritema nodosum leprosum", "Reaksi reversal", "Fenomena Lucio", "Relaps kusta", "Erupsi obat alergik"], "a": "Eritema nodosum leprosum", "skdi": "4A", "e": "Nodul eritem nyeri disertai demam pada kusta multibasilar adalah eritema nodosum leprosum atau reaksi kusta tipe 2 yang diperantarai kompleks imun. Reaksi reversal (tipe 1) berupa peradangan pada lesi lama tanpa nodul sistemik, fenomena Lucio berupa nekrosis, relaps adalah kambuh aktif.", "n": "Aorta 19 no.91"},
{"t": "Parasit", "q": "Seorang anak laki-laki 7 tahun dibawa karena bercak merah sangat gatal di punggung kaki yang membentuk lesi berkelok-kelok serpiginosa, muncul setelah bermain pasir di pantai tanpa alas kaki. Apakah penyebab penyakit ini?", "o": ["Ancylostoma braziliense", "Taenia saginata", "Pediculus humanus", "Sarcoptes scabiei", "Trichuris trichiura"], "a": "Ancylostoma braziliense", "skdi": "4A", "e": "Lesi serpiginosa yang menjalar (creeping eruption) setelah kontak tanah atau pasir berpasir khas cutaneous larva migrans akibat larva Ancylostoma braziliense. Taenia menyebabkan taeniasis usus, Pediculus menyebabkan pedikulosis, Sarcoptes menyebabkan skabies, Trichuris menyebabkan trikuriasis.", "n": "Kuis Pekan 3 no.4"},
{"t": "Erupsi Obat", "q": "Seorang perempuan 47 tahun mengeluh ruam merah kehitaman pada tungkai yang kambuh-kambuhan. Tampak patch eritematosa berbentuk oval pada lokasi yang sama, dan keluhan selalu muncul setiap pasien mengonsumsi jamu pegal linu. Apakah diagnosis yang sesuai?", "o": ["Fixed drug eruption", "Stevens-Johnson syndrome", "Eritema multiforme", "Dermatitis kontak alergi", "Eritema nodosum"], "a": "Fixed drug eruption", "skdi": "4A", "e": "Patch oval berulang di lokasi yang sama setiap mengonsumsi obat atau jamu tertentu khas fixed drug eruption. SJS dan eritema multiforme bersifat akut luas, DKA terkait kontak alergen topikal, eritema nodosum berupa nodul nyeri di tungkai tanpa pola berulang terkait obat.", "n": "Kuis Pekan 4 no.2"},
{"t": "Mikosis", "q": "Seorang anak perempuan 7 tahun datang dengan gatal dan kebotakan setempat di kepala sejak 1 bulan disertai sisik, memelihara kucing di rumah. Tampak patch keabuan dengan skuama dan rambut patah tepat di atas kulit kepala. Apakah diagnosis yang paling tepat?", "o": ["Grey patch ringworm tinea kapitis", "Black dot tinea kapitis", "Kerion celsi", "Tinea favosa", "Dermatitis seboroik"], "a": "Grey patch ringworm tinea kapitis", "skdi": "4A", "e": "Patch keabuan berskuama dengan rambut patah di atas permukaan kulit kepala akibat Microsporum khas grey patch ringworm, sering dari hewan seperti kucing. Black dot oleh Trichophyton dengan rambut patah di muara folikel, kerion berupa massa radang bernanah, favosa dengan skutula, seboroik tanpa kerontokan dan rambut patah.", "n": "Anthelix no.47"},
{"t": "IMS", "q": "Seorang perempuan 12 tahun menjalani pemeriksaan laboratorium dan didapatkan tes non-treponema VDRL reaktif dengan titer 1/4, namun tes treponema TPHA non-reaktif. Bagaimana interpretasi hasil tersebut?", "o": ["Positif palsu biologik", "Infeksi treponema aktif", "Sifilis laten lanjut", "Reinfeksi sifilis", "Neurosifilis"], "a": "Positif palsu biologik", "skdi": "3A", "e": "VDRL reaktif titer rendah dengan TPHA non-reaktif menunjukkan biological false positive karena tes treponemal yang spesifik negatif. Diagnosis sifilis memerlukan konfirmasi tes treponemal yang reaktif, sehingga pilihan infeksi aktif, laten, reinfeksi, dan neurosifilis tidak tepat.", "n": "Aorta 19 no.94"},
{"t": "Tumor Kulit", "q": "Seorang perempuan 46 tahun datang dengan bercak kecoklatan di wajah, leher, dan dada sejak 3 tahun yang membesar dan bertambah banyak. Tampak papul hiperpigmentasi multipel batas tegas dengan permukaan verukosa tampak menempel seperti ditempel di kulit. Apakah diagnosis yang paling tepat?", "o": ["Keratosis seboroik", "Melasma", "Lentigo solaris", "Veruka vulgaris", "Nevus pigmentosus"], "a": "Keratosis seboroik", "skdi": "2", "e": "Papul hiperpigmentasi verukosa dengan tampilan stuck-on pada usia lanjut khas keratosis seboroik. Melasma berupa makula hiperpigmentasi datar simetris, lentigo solaris makula datar, veruka vulgaris papul kasar akibat HPV, nevus pigmentosus tampak sebagai tahi lalat.", "n": "Aorta 19 no.15"},
{"t": "Bioetik", "q": "Seorang dokter didatangi pasangan; sang istri hamil 8 minggu dan menderita kusta, lalu suami meminta resep obat penggugur kandungan karena takut anak tertular. Dokter menolak memberi abortifasien dan menyarankan rujukan yang tepat. Kaidah bioetik apa yang menjadi dasar penolakan tersebut?", "o": ["Non-maleficence", "Autonomy", "Justice", "Beneficence", "Fidelity"], "a": "Non-maleficence", "skdi": "— (etik)", "e": "Menolak tindakan aborsi tanpa indikasi medis yang membahayakan janin menerapkan non-maleficence yaitu tidak menimbulkan bahaya. Autonomy menghormati keputusan pasien, justice keadilan, beneficence berbuat baik, fidelity menjaga kesetiaan dan janji profesi.", "n": "Axon 20 no.26 / Amygdala no.103"},
{"t": "Dermatitis", "q": "Seorang anak laki-laki 8 tahun sangat gatal dan kambuh-kambuhan sejak usia 2 tahun, dengan riwayat keluarga menderita keluhan serupa dan asma. Tampak papul dan plak dengan ekskoriasi serta likenifikasi di daerah lipatan. Apakah diagnosis yang paling tepat?", "o": ["Dermatitis atopik", "Dermatitis kontak alergi", "Skabies", "Liken simpleks kronik", "Psoriasis"], "a": "Dermatitis atopik", "skdi": "4A", "e": "Gatal kronik kambuhan sejak kecil dengan predileksi lipatan dan riwayat atopi keluarga khas dermatitis atopik. DKA terkait alergen kontak, skabies gatal malam dengan terowongan dan riwayat kontak, liken simpleks kronik akibat garukan kronik terlokalisir, psoriasis dengan skuama mikaseus.", "n": "Ascendens no.101"},
{"t": "Eritroskuamosa", "q": "Seorang laki-laki 45 tahun datang dengan bercak merah bersisik di siku, lutut, dan kepala sejak 2 minggu disertai gatal dan nyeri sendi. Tampak plak eritem dengan skuama mikaseus multipel. Bila dilakukan biopsi, apakah gambaran histopatologi yang khas?", "o": ["Parakeratosis dengan mikroabses Munro", "Spongiosis luas", "Akantolisis suprabasal", "Granuloma tuberkuloid", "Infiltrat limfosit band-like"], "a": "Parakeratosis dengan mikroabses Munro", "skdi": "3A", "e": "Psoriasis menunjukkan parakeratosis, akantosis reguler, dan mikroabses Munro berupa neutrofil di stratum korneum. Spongiosis pada dermatitis, akantolisis pada pemfigus, granuloma tuberkuloid pada TB kulit, infiltrat band-like pada liken planus.", "n": "Arthron 18 no.28 / Aorta 19 no.87"},
{"t": "Kelainan Rambut", "q": "Seorang laki-laki 34 tahun mengeluh kebotakan setempat yang muncul bertahap dan makin memburuk tanpa gatal maupun nyeri. Pemeriksaan menunjukkan kebotakan terlokalisir tanpa tanda inflamasi, tanpa jaringan parut, dengan rambut tanda seru di tepi lesi. Apakah diagnosis yang paling tepat?", "o": ["Alopesia areata", "Alopesia androgenik", "Alopesia sikatrik", "Telogen effluvium", "Anagen effluvium"], "a": "Alopesia areata", "skdi": "2", "e": "Kebotakan terlokalisir berbatas tegas tanpa inflamasi maupun parut dengan exclamation mark hair khas alopesia areata. Alopesia androgenik berpola garis rambut mundur, sikatrik meninggalkan parut, telogen dan anagen effluvium berupa kerontokan difus.", "n": "Axon 20 no.8"},
{"t": "IMS", "q": "Seorang perempuan 32 tahun datang dengan kutil kelamin sejak 1 bulan. Tampak papul verukous sewarna kulit, multipel dan diskret pada vulva dan vagina. Apakah pemeriksaan penunjang sederhana yang tepat untuk kasus ini?", "o": ["Tes asam asetat 5 persen", "Tes Tzanck", "Pemeriksaan KOH", "Tes VDRL", "Pengecatan Gram"], "a": "Tes asam asetat 5 persen", "skdi": "3A", "e": "Pengolesan asam asetat 5 persen menimbulkan gambaran acetowhite pada lesi kondiloma akuminata akibat HPV. Tzanck untuk herpes, KOH untuk jamur, VDRL untuk sifilis, dan pengecatan Gram untuk infeksi bakteri seperti gonore.", "n": "Kuis Pekan 4 no.1"},
{"t": "Dermatitis", "q": "Seorang laki-laki 30 tahun mengeluh bercak merah gatal di sekitar hidung dan alis sejak 1 minggu yang memberat saat menghadapi ujian, dengan riwayat ketombe. Apakah apendiks kulit yang paling berperan dalam patogenesis penyakit ini?", "o": ["Glandula sebasea", "Glandula sudorifera ekrin", "Glandula apokrin", "Folikel rambut", "Melanosit"], "a": "Glandula sebasea", "skdi": "4A", "e": "Dermatitis seboroik terjadi di area kaya kelenjar sebasea dan berkaitan dengan Malassezia serta produksi sebum, diperberat stres. Kelenjar ekrin dan apokrin berperan pada gangguan keringat, folikel rambut pada folikulitis, melanosit pada gangguan pigmentasi.", "n": "Aorta 19 no.25"},
{"t": "Virologi", "q": "Seorang perempuan 22 tahun datang dengan bercak merah di punggung sejak 1 minggu, diawali satu bercak besar di perut yang diikuti banyak bercak lebih kecil dengan skuama kolaret, KOH negatif. Apakah virus yang reaktivasinya dianggap sebagai penyebab penyakit ini?", "o": ["Human herpesvirus 6 dan 7", "Poxvirus", "Human papillomavirus", "Varicella zoster virus", "Epstein-Barr virus"], "a": "Human herpesvirus 6 dan 7", "skdi": "3A", "e": "Pitiriasis rosea diawali herald patch lalu lesi menyebar pola pohon natal dengan skuama kolaret, dan dikaitkan dengan reaktivasi HHV-6 dan HHV-7. Poxvirus menyebabkan moluskum, HPV menyebabkan veruka, VZV menyebabkan herpes zoster, EBV terkait mononukleosis.", "n": "Anthelix no.59"},
{"t": "IMS", "q": "Seorang perempuan 32 tahun mengeluh keputihan sejak 1 minggu disertai rasa panas dan ingin berkemih terus. Tampak sekret vagina kekuningan berbuih dan serviks memberikan gambaran strawberry cervix. Apakah pemeriksaan yang paling disarankan?", "o": ["Sediaan basah NaCl dari forniks posterior", "Pemeriksaan KOH 10 persen", "Tes Tzanck", "Pewarnaan Gram sekret uretra", "Kultur media Thayer-Martin"], "a": "Sediaan basah NaCl dari forniks posterior", "skdi": "4A", "e": "Strawberry cervix dengan sekret kuning berbuih khas trikomoniasis; pemeriksaan sediaan basah NaCl memperlihatkan Trichomonas vaginalis yang motil. KOH untuk kandida, Tzanck untuk herpes, Gram dan Thayer-Martin untuk gonore.", "n": "Aorta 19 no.21"},
{"t": "Tumor Kulit", "q": "Seorang anak perempuan 2 bulan dibawa karena benjolan merah di lengan yang muncul sejak usia 2 minggu dan membesar. Tampak nodul eritem soliter non-blanching. Apakah mekanisme yang mendasari kasus ini?", "o": ["Angiogenesis", "Adipogenesis", "Malformasi venosa", "Vasodilatasi sementara", "Vesikulopati"], "a": "Angiogenesis", "skdi": "2", "e": "Hemangioma infantil muncul beberapa minggu setelah lahir dan membesar akibat proliferasi pembuluh darah atau angiogenesis. Malformasi vaskular sudah ada sejak lahir dan tumbuh proporsional, sedangkan adipogenesis, vasodilatasi sementara, dan vesikulopati tidak menjelaskan nodul vaskular yang membesar ini.", "n": "Aorta 19 no.84"},

{"t": "Parasit", "q": "Seorang laki-laki 45 tahun mengeluh gatal di kaki sejak 2 minggu dengan bercak merah yang makin menjalar berkelok, riwayat bermain di pasir pantai tanpa alas kaki. Apakah terapi kausatif yang paling tepat?", "o": ["Albendazol 400 mg per hari selama 3 hari", "Prednison 2x5 mg selama 5 hari", "Pirantel pamoat dosis tunggal", "Permetrin 5 persen topikal", "Amoksisilin 3x500 mg selama 5 hari"], "a": "Albendazol 400 mg per hari selama 3 hari", "skdi": "4A", "e": "Cutaneous larva migrans diterapi antihelmintik seperti albendazol 400 mg per hari selama 3 hari atau tiabendazol. Prednison hanya simptomatik, pirantel pamoat untuk cacing usus, permetrin untuk skabies, dan amoksisilin untuk infeksi bakteri.", "n": "Aorta 19 no.13 / Aorta 19 no.53"},
{"t": "Kelenjar Sebasea", "q": "Seorang perempuan 19 tahun mengeluh bintik hitam dan kadang bernanah di wajah sejak 1 bulan. Tampak komedo blackhead terutama di hidung berjumlah sekitar 10, disertai papul eritem dan pustul berjumlah sekitar 12, tanpa nodul. Apakah diagnosis yang paling tepat?", "o": ["Akne vulgaris ringan", "Akne vulgaris sedang", "Dermatitis perioral", "Erupsi akneiformis", "Dermatitis seboroik"], "a": "Akne vulgaris ringan", "skdi": "4A", "e": "Komedo dengan sedikit papulopustul tanpa nodul tergolong akne vulgaris ringan. Akne sedang bila lesi inflamasi lebih banyak, dermatitis perioral tanpa komedo, erupsi akneiformis dipicu obat dan muncul mendadak monomorf, dermatitis seboroik berupa skuama berminyak.", "n": "Aorta 19 no.86"},
{"t": "Kelenjar Sebasea", "q": "Seorang perempuan 16 tahun datang dengan jerawat; tampak komedo, papul, pustul, dan nodul di wajah dan dada atas. Dokter memberikan krim malam yang bersifat anti-hiperkeratinisasi. Apakah obat topikal yang dimaksud?", "o": ["Asam retinoat", "Asam fusidat", "Klindamisin", "Benzoil peroksida", "Sulfur presipitatum"], "a": "Asam retinoat", "skdi": "4A", "e": "Asam retinoat (tretinoin) bersifat komedolitik dan anti-hiperkeratinisasi sehingga dipakai sebagai krim malam pada akne. Asam fusidat dan klindamisin bersifat antibakteri, benzoil peroksida antibakteri dan keratolitik ringan, sulfur bersifat keratolitik tetapi bukan anti-hiperkeratinisasi utama.", "n": "Aorta 19 no.10"},
{"t": "UKK", "q": "Seorang perempuan dengan varises tungkai mengeluh borok yang nyeri di tungkai bawah. Pada pemeriksaan tampak defek kulit yang melewati epidermis hingga dermis sehingga bila sembuh meninggalkan jaringan parut. Apakah istilah ujud kelainan kulit yang tepat?", "o": ["Ulkus", "Erosi", "Ekskoriasi", "Krusta", "Fisura"], "a": "Ulkus", "skdi": "— (UKK dasar)", "e": "Defek kulit yang mencapai dermis atau lebih dalam sehingga sembuh dengan parut disebut ulkus. Erosi hanya sampai epidermis tanpa parut, ekskoriasi akibat garukan, krusta adalah eksudat mengering, fisura berupa retakan linier.", "n": "Axon 20 no.14"},
{"t": "IMS", "q": "Seorang laki-laki 35 tahun datang dengan bercak merah di telapak tangan dan kaki sejak 1 minggu, tidak gatal maupun nyeri, disertai rambut rontok dan riwayat luka di kelamin yang sembuh sendiri 2 bulan lalu. Apakah terapi yang paling tepat?", "o": ["Benzatin penisilin G 2,4 juta unit intramuskular", "Injeksi difenhidramin 1 ampul per hari", "Asiklovir 5x200 mg per oral", "Ceftriakson 1 g tiap 12 jam", "Metilprednisolon 62,5 mg injeksi"], "a": "Benzatin penisilin G 2,4 juta unit intramuskular", "skdi": "4A", "e": "Ruam pada telapak tangan dan kaki tidak nyeri dengan riwayat ulkus genital yang sembuh sendiri khas sifilis sekunder; terapi lini pertama benzatin penisilin G. Antihistamin dan kortikosteroid tidak kuratif, asiklovir untuk herpes, ceftriakson untuk gonore.", "n": "Arthron 18 no.18"},
{"t": "Mikosis", "q": "Seorang perempuan 25 tahun olahragawan mengeluh gatal dan kemerahan di bawah payudara, ketiak, dan selangkangan sejak 2 minggu. Tampak plak eritem dengan maserasi dan lesi satelit di sekitarnya. Apakah pemeriksaan dan hasil yang diharapkan?", "o": ["KOH 10 persen menunjukkan pseudohifa dan blastospora", "KOH 10 persen menunjukkan hifa panjang bersepta", "KOH dengan tinta Parker menunjukkan spaghetti and meatballs", "Pengecatan Gram menunjukkan kokus Gram positif", "Lampu Wood menunjukkan fluoresensi merah bata"], "a": "KOH 10 persen menunjukkan pseudohifa dan blastospora", "skdi": "4A", "e": "Plak eritem dengan maserasi dan lesi satelit di area lembap khas kandidiasis kutis; KOH menunjukkan pseudohifa dan blastospora. Hifa panjang bersepta pada dermatofitosis, spaghetti and meatballs pada pitiriasis versikolor, kokus Gram positif pada pioderma, fluoresensi merah bata pada eritrasma.", "n": "Kuis Pekan 3 no.3"},
{"t": "Mikosis", "q": "Seorang perempuan 35 tahun mengeluh bercak merah gatal di bawah payudara terutama saat berkeringat. Tampak plak eritem polisiklik dengan tepi lebih aktif dan central healing. Bila ingin mengidentifikasi organisme penyebab, media kultur apakah yang digunakan?", "o": ["Sabouraud dextrose agar", "Lowenstein-Jensen", "Mueller-Hinton", "Thayer-Martin", "Agar darah"], "a": "Sabouraud dextrose agar", "skdi": "4A", "e": "Tinea korporis dengan central healing disebabkan dermatofita yang dikultur pada Sabouraud dextrose agar. Lowenstein-Jensen untuk mikobakterium, Mueller-Hinton untuk uji kepekaan antibiotik, Thayer-Martin untuk Neisseria, agar darah untuk bakteri umum.", "n": "Kuis Pekan 3 no.1 / Aorta 19 no.97"},
];
window.QUESTIONS=QUESTIONS;</script>
<script>
(function(){
"use strict";
var QS = window.QUESTIONS || [];
var TOTAL = QS.length;
var EXAM_MINUTES = 150;
var LS_KEY = "cbt_derma_v1";
var app = document.getElementById("app");
var toastEl = document.getElementById("toast");
var toastTimer = null;

var state = null;
var tick = null;

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 1800);
}
function esc(s){ return String(s).replace(/[&<>]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]; }); }
function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

/* ---------- persistence ---------- */
function save(){ if(!state) return; try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
function load(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(!raw) return null;
    var s = JSON.parse(raw);
    if(!s || s.total !== TOTAL || !s.order || s.order.length !== TOTAL) return null;
    return s;
  }catch(e){ return null; }
}
function clearSave(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }

/* ---------- state factory (always shuffled + practice) ---------- */
function newState(){
  var order = [];
  for(var i=0;i<TOTAL;i++) order.push(i);
  order = shuffle(order);
  var optOrders = {};
  for(var k=0;k<TOTAL;k++){
    var n = QS[k].o.length;
    var idx = []; for(var j=0;j<n;j++) idx.push(j);
    optOrders[k] = shuffle(idx);
  }
  return {
    total: TOTAL, order: order, optOrders: optOrders,
    answers: {}, flags: {}, pos: 0,
    remaining: EXAM_MINUTES*60,
    started: false, finished: false,
    practice: true, shuffleQ: true
  };
}

/* ---------- timer ---------- */
function startTimer(){
  if(tick) return;
  tick = setInterval(function(){
    if(!state || state.finished){ return; }
    state.remaining--;
    if(state.remaining<=0){ state.remaining=0; updateClock(); finishExam(true); return; }
    updateClock();
    save();
  },1000);
}
function fmt(sec){
  var h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  function p(x){ return (x<10?"0":"")+x; }
  return p(h)+":"+p(m)+":"+p(s);
}
function updateClock(){
  var c=document.getElementById("clock");
  if(!c) return;
  c.textContent = fmt(state.remaining);
  c.classList.remove("warn","danger");
  if(state.remaining<=300) c.classList.add("danger");
  else if(state.remaining<=900) c.classList.add("warn");
}

function curQi(){ return state.order[state.pos]; }

/* ---------- exam screen ---------- */
function renderExam(){
  app.innerHTML = "\
  <div class='topbar'>\
    <div class='title'>Dermatologi &amp; Venereologi <small>Computer-Based Test \u00B7 "+TOTAL+" soal \u00B7 Mode Latihan</small></div>\
    <div class='timer'>\
      <div class='lbl'>Sisa<br>Waktu</div>\
      <div class='clock' id='clock'>"+fmt(state.remaining)+"</div>\
    </div>\
  </div>\
  <div class='wrap'>\
    <div class='grid'>\
      <div id='qpane'></div>\
      <div class='side'>\
        <h3>Navigasi Soal</h3>\
        <div class='legend'>\
          <span><i class='dot g'></i>Terjawab</span>\
          <span><i class='dot o'></i>Ragu-ragu</span>\
          <span><i class='dot a'></i>Kosong</span>\
          <span><i class='dot c'></i>Aktif</span>\
        </div>\
        <div class='navgrid' id='navgrid'></div>\
        <div class='summary' id='summary'></div>\
        <div class='kbdhint'>\u2328 Gunakan tombol <b>\u2190</b> dan <b>\u2192</b> untuk berpindah soal, <b>1\u20135</b> untuk memilih jawaban, <b>F</b> untuk ragu-ragu.</div>\
        <button class='btn btn-danger stopbtn' id='stopBtn'>HENTIKAN UJIAN</button>\
      </div>\
    </div>\
  </div>";
  document.getElementById("stopBtn").onclick=function(){
    var ans=Object.keys(state.answers).length;
    if(confirm("Hentikan ujian sekarang?\\n\\nTerjawab: "+ans+" dari "+TOTAL+" soal.\\nSetelah dihentikan, skor dan seluruh pembahasan akan ditampilkan.")){
      finishExam(false);
    }
  };
  updateClock();
  renderQuestion();
  renderNav();
}

function selectOption(displayIdx){
  if(!state || state.finished) return;
  var qi=curQi();
  if(state.answers.hasOwnProperty(qi)) return; // already answered (practice locks)
  var ord=state.optOrders[qi];
  if(displayIdx<0 || displayIdx>=ord.length) return;
  state.answers[qi]=ord[displayIdx];
  if(!state.started && state.pos===0){ state.started=true; startTimer(); toast("\u23F1 Waktu dimulai!"); }
  save(); renderQuestion(); renderNav();
}
function toggleFlag(){
  if(!state) return;
  var qi=curQi();
  if(state.flags[qi]) delete state.flags[qi]; else state.flags[qi]=true;
  save(); renderQuestion(); renderNav();
}
function gotoPos(p){
  if(!state) return;
  if(p<0||p>=TOTAL) return;
  state.pos=p; save(); renderQuestion(); renderNav(); window.scrollTo(0,0);
}

function renderQuestion(){
  var qi=curQi();
  var q=QS[qi];
  var ord=state.optOrders[qi];
  var sel=state.answers.hasOwnProperty(qi)?state.answers[qi]:null;
  var reveal = state.finished || (state.practice && sel!==null);
  var correctOrig = q.o.indexOf(q.a);
  var letters=["A","B","C","D","E"];
  var html="<div class='card'>";
  html+="<div class='qhead'><span class='qnum'>Soal "+(state.pos+1)+" / "+TOTAL+"</span>";
  html+="<span class='chip'>"+esc(q.t)+"</span>";
  html+="<span class='chip src'>\uD83D\uDCDA "+esc(q.n)+"</span>";
  if(reveal) html+="<span class='chip skdi'>SKDI: "+esc(q.skdi)+"</span>";
  html+="</div>";
  html+="<div class='qstem'>"+esc(q.q)+"</div>";
  html+="<div class='options'>";
  for(var d=0; d<ord.length; d++){
    var origIdx=ord[d];
    var cls="option";
    if(reveal){
      if(origIdx===correctOrig) cls+=" correct";
      else if(origIdx===sel) cls+=" wrong";
    } else if(origIdx===sel){ cls+=" sel"; }
    html+="<button class='"+cls+"' "+(reveal?"disabled":"")+" data-disp='"+d+"'>";
    html+="<span class='key'>"+letters[d]+"</span><span class='txt'>"+esc(q.o[origIdx])+"</span></button>";
  }
  html+="</div>";
  if(reveal){
    var keyLetter=letters[ord.indexOf(correctOrig)];
    html+="<div class='explain'>";
    html+="<div class='keyline'><b>Kunci Jawaban: "+keyLetter+".</b> "+esc(q.a)+" &nbsp;\u00B7&nbsp; <b>Level SKDI:</b> "+esc(q.skdi)+" &nbsp;\u00B7&nbsp; <b>Sumber:</b> "+esc(q.n)+"</div>";
    html+="<h4>Pembahasan</h4><div class='body'>"+esc(q.e)+"</div>";
    html+="</div>";
  }
  var flagged=!!state.flags[qi];
  html+="<div class='actionrow'>";
  html+="<button class='flagbtn "+(flagged?"on":"")+"' id='flagBtn'>\u2691 "+(flagged?"Ditandai ragu-ragu":"Ragu-ragu")+"</button>";
  html+="<div class='nav-btns'>";
  html+="<button class='smallbtn' id='prevBtn' "+(state.pos===0?"disabled":"")+">\u2190 Sebelumnya</button>";
  html+="<button class='smallbtn primary' id='nextBtn' "+(state.pos===TOTAL-1?"disabled":"")+">Berikutnya \u2192</button>";
  html+="</div></div>";
  html+="</div>";
  document.getElementById("qpane").innerHTML=html;

  if(!reveal){
    document.querySelectorAll("#qpane .option").forEach(function(b){
      b.onclick=function(){ selectOption(parseInt(b.getAttribute("data-disp"),10)); };
    });
  }
  document.getElementById("flagBtn").onclick=toggleFlag;
  var pv=document.getElementById("prevBtn"); if(pv) pv.onclick=function(){ gotoPos(state.pos-1); };
  var nx=document.getElementById("nextBtn"); if(nx) nx.onclick=function(){ gotoPos(state.pos+1); };
}

function renderNav(){
  var grid=document.getElementById("navgrid");
  if(!grid) return;
  var html="";
  for(var p=0;p<TOTAL;p++){
    var qi=state.order[p];
    var cls="navcell";
    if(state.answers.hasOwnProperty(qi)) cls+=" answered";
    if(state.flags[qi]) cls+=" flagged flag-mark";
    if(p===state.pos) cls+=" current";
    html+="<button class='"+cls+"' data-pos='"+p+"'>"+(p+1)+"</button>";
  }
  grid.innerHTML=html;
  grid.querySelectorAll(".navcell").forEach(function(c){
    c.onclick=function(){ gotoPos(parseInt(c.getAttribute("data-pos"),10)); };
  });
  var ans=Object.keys(state.answers).length;
  var fl=Object.keys(state.flags).length;
  document.getElementById("summary").innerHTML="<div>Terjawab: <b>"+ans+"</b> / "+TOTAL+"</div><div>Ragu-ragu: <b>"+fl+"</b></div><div>Belum dijawab: <b>"+(TOTAL-ans)+"</b></div>";
}

/* ---------- finish + result ---------- */
function finishExam(timeUp){
  state.finished=true;
  if(tick){ clearInterval(tick); tick=null; }
  save();
  renderResult(timeUp);
}
function computeScore(){
  var correct=0, answered=0, byTopic={};
  for(var qi=0; qi<TOTAL; qi++){
    var q=QS[qi];
    if(!byTopic[q.t]) byTopic[q.t]={c:0,t:0};
    byTopic[q.t].t++;
    if(state.answers.hasOwnProperty(qi)){
      answered++;
      if(state.answers[qi]===q.o.indexOf(q.a)){ correct++; byTopic[q.t].c++; }
    }
  }
  return {correct:correct,answered:answered,byTopic:byTopic};
}
function renderResult(timeUp){
  if(tick){ clearInterval(tick); tick=null; }
  var r=computeScore();
  var pct=TOTAL?Math.round(r.correct/TOTAL*100):0;
  var ringColor = pct>=70 ? "linear-gradient(135deg,#16a34a,#22c55e)" : pct>=50 ? "linear-gradient(135deg,#f59e0b,#f97316)" : "linear-gradient(135deg,#dc2626,#ef4444)";
  var topics=Object.keys(r.byTopic).sort();
  var trows="";
  topics.forEach(function(t){
    var o=r.byTopic[t]; var tp=Math.round(o.c/o.t*100);
    trows+="<div class='topic-row'><div style='flex:0 0 150px'>"+esc(t)+"</div><div class='bar'><i style='width:"+tp+"%'></i></div><div class='pct'>"+o.c+"/"+o.t+" ("+tp+"%)</div></div>";
  });
  app.innerHTML="\
  <div class='wrap'>\
    <div class='result-hero'>\
      "+(timeUp?"<div style='color:#dc2626;font-weight:700;margin-bottom:8px'>\u23F0 Waktu habis \u2014 ujian otomatis dihentikan</div>":"")+"\
      <h1 style='margin:0 0 4px'>Hasil Ujian</h1>\
      <div style='color:#64748b;font-size:14px'>Dermatologi &amp; Venereologi</div>\
      <div class='score-ring' style='background:"+ringColor+"'><b>"+pct+"%</b><span>Skor Akhir</span></div>\
      <div class='result-stats'>\
        <div class='rstat' style='color:#16a34a'><b>"+r.correct+"</b><span>Benar</span></div>\
        <div class='rstat' style='color:#dc2626'><b>"+(r.answered-r.correct)+"</b><span>Salah</span></div>\
        <div class='rstat' style='color:#64748b'><b>"+(TOTAL-r.answered)+"</b><span>Kosong</span></div>\
        <div class='rstat'><b>"+TOTAL+"</b><span>Total</span></div>\
      </div>\
      <div class='topic-table'><h3 style='font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-bottom:6px'>Sebaran per Topik</h3>"+trows+"</div>\
      <div class='result-actions'>\
        <button class='btn' id='reviewBtn'>\uD83D\uDCD6 Buka Semua Pembahasan</button>\
        <button class='btn btn-ghost' id='restartBtn'>\uD83D\uDD04 Ulangi Ujian Baru</button>\
      </div>\
    </div>\
  </div>";
  document.getElementById("reviewBtn").onclick=function(){ state.pos=0; renderReview(); };
  document.getElementById("restartBtn").onclick=function(){ clearSave(); state=newState(); save(); renderExam(); window.scrollTo(0,0); };
}

function renderReview(){
  var letters=["A","B","C","D","E"];
  var html="<div class='topbar'><div class='title'>Pembahasan Lengkap <small>"+TOTAL+" soal</small></div><button class='smallbtn primary' id='backTop'>\u2191 Kembali ke Skor</button></div><div class='wrap'>";
  for(var p=0;p<TOTAL;p++){
    var qi=state.order[p];
    var q=QS[qi];
    var ord=state.optOrders[qi];
    var sel=state.answers.hasOwnProperty(qi)?state.answers[qi]:null;
    var correctOrig=q.o.indexOf(q.a);
    var statusTxt = sel===null ? "<span style='color:#64748b'>Tidak dijawab</span>" : (sel===correctOrig?"<span style='color:#16a34a;font-weight:700'>Benar</span>":"<span style='color:#dc2626;font-weight:700'>Salah</span>");
    html+="<div class='card' style='margin-bottom:16px'>";
    html+="<div class='qhead'><span class='qnum'>No. "+(p+1)+"</span><span class='chip'>"+esc(q.t)+"</span><span class='chip src'>\uD83D\uDCDA "+esc(q.n)+"</span><span class='chip skdi'>SKDI: "+esc(q.skdi)+"</span><span style='margin-left:auto;font-size:13px'>"+statusTxt+"</span></div>";
    html+="<div class='qstem'>"+esc(q.q)+"</div><div class='options'>";
    for(var d=0;d<ord.length;d++){
      var origIdx=ord[d]; var cls="option";
      if(origIdx===correctOrig) cls+=" correct"; else if(origIdx===sel) cls+=" wrong";
      html+="<button class='"+cls+"' disabled><span class='key'>"+letters[d]+"</span><span class='txt'>"+esc(q.o[origIdx])+"</span></button>";
    }
    html+="</div>";
    var keyLetter=letters[ord.indexOf(correctOrig)];
    html+="<div class='explain'><div class='keyline'><b>Kunci Jawaban: "+keyLetter+".</b> "+esc(q.a)+" &nbsp;\u00B7&nbsp; <b>Level SKDI:</b> "+esc(q.skdi)+" &nbsp;\u00B7&nbsp; <b>Sumber:</b> "+esc(q.n)+"</div><h4>Pembahasan</h4><div class='body'>"+esc(q.e)+"</div></div>";
    html+="</div>";
  }
  html+="<div style='text-align:center;padding:10px 0 40px'><button class='btn btn-ghost' id='restart2'>\uD83D\uDD04 Ulangi Ujian Baru</button></div></div>";
  app.innerHTML=html;
  document.getElementById("backTop").onclick=function(){ renderResult(false); window.scrollTo(0,0); };
  document.getElementById("restart2").onclick=function(){ clearSave(); state=newState(); save(); renderExam(); window.scrollTo(0,0); };
  window.scrollTo(0,0);
}

/* ---------- keyboard navigation ---------- */
document.addEventListener("keydown", function(ev){
  if(!state || state.finished) return;
  if(!document.getElementById("qpane")) return; // only on exam screen
  var tag=(ev.target&&ev.target.tagName)?ev.target.tagName.toLowerCase():"";
  if(tag==="input"||tag==="textarea"||tag==="select") return;
  if(ev.key==="ArrowLeft"){ ev.preventDefault(); gotoPos(state.pos-1); }
  else if(ev.key==="ArrowRight"){ ev.preventDefault(); gotoPos(state.pos+1); }
  else if(ev.key>="1" && ev.key<="5"){ ev.preventDefault(); selectOption(parseInt(ev.key,10)-1); }
  else if(ev.key==="f"||ev.key==="F"){ ev.preventDefault(); toggleFlag(); }
});

/* ---------- boot ---------- */
var existing=load();
if(existing){
  state=existing;
  if(state.finished){ renderResult(false); }
  else { renderExam(); if(state.started) startTimer(); }
} else {
  state=newState();
  save();
  renderExam();
}
})();
</script>
</body>
</html>
